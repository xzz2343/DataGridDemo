name: Build & Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to IONOS via SFTP
        env:
          LFTP_HOST: ${{ secrets.FTP_SERVER }}
          LFTP_USER: ${{ secrets.FTP_USERNAME }}
          LFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -c "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'; set net:max-retries 3; set net:timeout 60; open -u $LFTP_USER,$LFTP_PASS sftp://$LFTP_HOST; mirror -R --delete --verbose ./out/ /httpdocs/datagriddemo/; quit"
